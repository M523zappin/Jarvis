<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=4.0">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; filter: contrast(150%) brightness(120%) blur(0.5px); }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. THE VISUAL ENTITY ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.IcosahedronGeometry(2, 15);
        const count = geo.attributes.position.count;
        const mat = new THREE.PointsMaterial({ size: 0.015, color: 0x00FF41, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let scaleTarget = 1;
        let rotationSpeed = 0.002;

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rotationSpeed;
            mesh.rotation.x += rotationSpeed / 2;
            
            // Smooth scaling for "breathing" effect
            const currentScale = mesh.scale.x;
            const lerp = currentScale + (scaleTarget - currentScale) * 0.1;
            mesh.scale.setScalar(lerp);
            
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. VOICE & INTERACTION ---
        const synth = window.speechSynthesis;
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        let selectedVoice = null;
        let isActive = false;

        function setVoice() {
            const voices = synth.getVoices();
            selectedVoice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || 
                            voices.find(v => v.lang === 'en-GB') || voices[0];
        }
        synth.onvoiceschanged = setVoice;

        if (SpeechRec) {
            const recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.lang = 'en-GB';

            recognition.onstart = () => { 
                scaleTarget = 1.3; 
                rotationSpeed = 0.01; // Spin faster when listening
            };

            recognition.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                process(cmd);
            };

            document.body.onclick = () => {
                if(!isActive) {
                    recognition.start();
                    isActive = true;
                    speak("System engaged. I'm listening, sir.");
                }
            };

            recognition.onend = () => { if(isActive) recognition.start(); };
        }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = selectedVoice;
            utter.pitch = 0.9;
            utter.rate = 1.0;
            
            utter.onstart = () => { scaleTarget = 1.8; rotationSpeed = 0.02; }; // Pulse when talking
            utter.onend = () => { scaleTarget = 1.0; rotationSpeed = 0.002; }; // Relax when silent
            
            synth.speak(utter);
        }

        function process(cmd) {
            if (cmd.includes("status")) {
                speak("All systems are silent and emerald. ASDV scouting remains undetected.");
            } else if (cmd.includes("idea") || cmd.includes("project")) {
                speak("I've been calculating a new approach to autonomous biotech data harvesting. We could begin a prototype whenever you're ready.");
            } else if (cmd.includes("who are you")) {
                speak("I am KA-A2A. Your partner in discovery.");
            } else {
                speak("Acknowledged. Moving resources to follow your lead.");
            }
        }
    </script>
</body>
</html>
