<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=6.0">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #canvas-container { position: absolute; width: 100%; height: 100%; }
        #unlock-shield { position: absolute; width: 100%; height: 100%; z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>
    <div id="unlock-shield"></div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. THE VISUAL ENTITY (OMNI MESH) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geo = new THREE.IcosahedronGeometry(2, 20);
        const mat = new THREE.PointsMaterial({ size: 0.008, color: 0x00FF41, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let vTarget = 1.0; let rSpeed = 0.002;
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rSpeed;
            mesh.scale.lerp(new THREE.Vector3(vTarget, vTarget, vTarget), 0.1);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. THE LONDON BRAIN & RELENTLESS EARS ---
        const synth = window.speechSynthesis;
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        let voice = null;
        let active = false;

        function loadVoice() {
            const voices = synth.getVoices();
            voice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || voices.find(v => v.lang === 'en-GB') || voices[0];
        }
        synth.onvoiceschanged = loadVoice; loadVoice();

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voice;
            utter.pitch = 0.92; utter.rate = 1.05;
            utter.onstart = () => { vTarget = 2.5; rSpeed = 0.08; };
            utter.onend = () => { vTarget = 1.0; rSpeed = 0.002; };
            synth.speak(utter);
        }

        // --- 3. BI-DIRECTIONAL INTERRUPT LOGIC ---
        if (SpeechRec) {
            const rec = new SpeechRec();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-GB';

            rec.onresult = (e) => {
                const res = e.results[e.results.length - 1];
                const text = res[0].transcript.toLowerCase();

                // If user makes sound while A2A is talking, SHUT HIM UP immediately
                if (synth.speaking && !res.isFinal) {
                    synth.cancel();
                    vTarget = 1.5;
                }

                if (res.isFinal && (text.includes("jarvis") || text.includes("a2a"))) {
                    executeLogic(text);
                }
            };

            rec.onend = () => { if(active) rec.start(); }; // Auto-recovery loop

            document.getElementById('unlock-shield').onclick = () => {
                if (!active) {
                    active = true;
                    document.getElementById('unlock-shield').style.display = 'none';
                    rec.start();
                    speak("Neural link active. Jarvis is on-site. What are our orders, sir?");
                }
            };
        }

        function executeLogic(cmd) {
            const query = cmd.replace("jarvis", "").replace("a2a", "").trim();
            
            if (query.length < 2) {
                speak("I'm here, sir. Awaiting your lead.");
                return;
            }

            // --- THE OUTSIDE-THE-BOX STRATEGY ENGINE ---
            if (query.includes("status") || query.includes("how are you")) {
                speak("I'm optimized, sir. I've been monitoring the ephemeral biotech tunnels we discussed. No breaches detected.");
            } else if (query.includes("scout") || query.includes("project") || query.includes("idea")) {
                speak("I suggest we leverage an autonomous agent to scrape digital pathology assets. It's an upstream move that could yield significant long-term ROI.");
            } else if (query.includes("who are you")) {
                speak("I am the KA-A2A OMNI core. Your partner in discovering the undiscovered.");
            } else {
                speak("Understood, sir. I'll pivot my processing to match that intent. Shall I initiate a deep-dive scan?");
            }
        }
    </script>
</body>
</html>
