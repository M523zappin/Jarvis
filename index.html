<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=4.1">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; filter: contrast(150%) brightness(120%); }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- VISUAL ENTITY ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.SphereGeometry(2, 64, 64);
        const mat = new THREE.PointsMaterial({ size: 0.01, color: 0x00FF41, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let scaleTarget = 1.0;
        let rotSpeed = 0.002;

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rotSpeed;
            mesh.scale.lerp(new THREE.Vector3(scaleTarget, scaleTarget, scaleTarget), 0.1);
            renderer.render(scene, camera);
        }
        animate();

        // --- THE "DANIEL" LONDON VOICE ---
        const synth = window.speechSynthesis;
        let britishVoice = null;
        
        function setVoice() {
            const voices = synth.getVoices();
            britishVoice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || 
                           voices.find(v => v.lang === 'en-GB') || voices[0];
        }
        synth.onvoiceschanged = setVoice;
        setVoice();

        // --- EXECUTION & LISTENING LOGIC ---
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (SpeechRec) {
            const recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-GB';

            recognition.onstart = () => { scaleTarget = 1.2; rotSpeed = 0.01; };
            recognition.onend = () => { if(isActive) recognition.start(); }; // Auto-restart loop

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                executeTask(command);
            };

            let isActive = false;
            document.body.onclick = () => {
                if (!isActive) {
                    recognition.start();
                    isActive = true;
                    speak("System live. I'm ready to execute, sir.");
                }
            };
        }

        function speak(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = britishVoice;
            msg.pitch = 0.9;
            msg.onstart = () => { scaleTarget = 2.0; rotSpeed = 0.03; };
            msg.onend = () => { scaleTarget = 1.0; rotSpeed = 0.002; };
            synth.speak(msg);
        }

        function executeTask(cmd) {
            // Autonomous Logic Switch
            if (cmd.includes("status")) {
                speak("All systems emerald. Scanning for biotech anomalies.");
            } else if (cmd.includes("project") || cmd.includes("idea")) {
                speak("I recommend we initiate an autonomous scraper for the latest neuro-tech patents. Shall I begin the draft?");
            } else if (cmd.includes("clear") || cmd.includes("reset")) {
                speak("Purging local cache stubs. System reset confirmed.");
            } else {
                speak("Command received. Executing via the Sentinel node.");
            }
        }
    </script>
</body>
</html>
