<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>KA-A2A CORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00FF41; }
        #hud-top { position: absolute; top: 50px; left: 30px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px #00FF41; }
        #terminal { 
            position: absolute; bottom: 40px; left: 20px; width: calc(100% - 40px); 
            height: 130px; font-size: 10px; background: rgba(0,10,0,0.9); 
            padding: 12px; border: 1px solid rgba(0,255,65,0.3); overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,255,65,0.1); z-index: 10; border-radius: 5px;
        }
        canvas { display: block; filter: contrast(130%) brightness(120%); }
        .scanning { border-top: 1px solid #00FF41; width: 100%; position: absolute; top: 0; animation: scan 3s infinite linear; opacity: 0.2; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="hud-top">
        <h2 style="margin:0; letter-spacing:6px; font-weight:lighter;">KA-A2A // CORE</h2>
        <div style="font-size:9px; opacity:0.7;">ASDV_LINK: STABLE | RRL_CYCLE: 14.2ms</div>
    </div>
    <div id="terminal"><div class="scanning"></div>> NEURAL MESH ONLINE...<br>> SELECTING LINGUISTIC PROFILE: UK_ELITE<br>> AWAITING COMMAND...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. THE ADVANCED POINT-CLOUD CORE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(5000 * 3);
        for(let i=0; i < 5000 * 3; i++) { posArray[i] = (Math.random() - 0.5) * 10; }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.005, color: 0x00FF41, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            const pulse = 1 + Math.sin(Date.now() * 0.0015) * 0.1;
            particlesMesh.scale.set(pulse, pulse, pulse);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. THE BRITISH VOICE CORE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        document.body.onclick = () => {
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.onresult = (e) => {
                    const input = e.results[e.results.length - 1][0].transcript.toLowerCase();
                    processIntent(input);
                };
                recognition.start();
                speak("Systems primed. What is the objective, sir?");
            }
        };

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            // Specifically hunting for the UK British accent
            const britishVoice = voices.find(v => v.lang.includes('en-GB')) || voices[0];
            utterance.voice = britishVoice;
            utterance.pitch = 0.9;
            utterance.rate = 1.05;
            synth.speak(utterance);
            updateTerminal("JARVIS: " + text);
        }

        function processIntent(input) {
            updateTerminal("USER: " + input);
            if (input.includes("status")) speak("All systems emerald. ASDV is currently scouting the ghost tunnels.");
            else if (input.includes("evolve")) speak("Understood. Commencing recursive research loop for logic optimization.");
            else speak("Acknowledged. Processing your request through the sentinel node.");
        }

        function updateTerminal(msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `<br>> ${msg.toUpperCase()}`;
            term.scrollTop = term.scrollHeight;
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
