<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=11.0">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #shield { position: absolute; width: 100%; height: 100%; z-index: 9999; }
    </style>
</head>
<body>
    <div id="shield"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. THE VISUAL ENTITY (BLOOMING MESH) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.IcosahedronGeometry(2, 25);
        const mat = new THREE.PointsMaterial({ size: 0.012, color: 0x00FF41, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let scale = 1.0; let rot = 0.003;
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rot;
            mesh.scale.lerp(new THREE.Vector3(scale, scale, scale), 0.1);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. THE DUPLEX ENGINE (TALK & LISTEN) ---
        const synth = window.speechSynthesis;
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        let v_uk = null; let active = false;

        function findVoice() {
            const voices = synth.getVoices();
            v_uk = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || voices.find(v => v.lang === 'en-GB') || voices[0];
        }
        synth.onvoiceschanged = findVoice; findVoice();

        // THE MOUTH (Synthesis)
        function speak(text) {
            synth.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = v_uk;
            msg.onstart = () => { scale = 2.5; rot = 0.08; };
            msg.onend = () => { scale = 1.0; rot = 0.003; };
            synth.speak(msg);
        }

        // THE EAR (Recognition)
        if (SpeechRec) {
            const rec = new SpeechRec();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-GB';

            rec.onresult = (e) => {
                const res = e.results[e.results.length - 1];
                const text = res[0].transcript.toLowerCase();

                // If user talks while Jarvis is speaking, interrupt him
                if (synth.speaking && !res.isFinal) { synth.cancel(); scale = 1.5; }

                if (res.isFinal) {
                    processIntent(text);
                }
            };

            rec.onend = () => { if(active) rec.start(); }; // Relentless restart

            document.getElementById('shield').onclick = () => {
                if (!active) {
                    active = true;
                    document.getElementById('shield').style.display = 'none';
                    rec.start();
                    speak("Bridge established, sir. My vocal processors are now synced with my ears. We are in full duplex mode.");
                }
            };
        }

        function processIntent(cmd) {
            if (cmd.includes("status")) speak("All systems emerald. Listening and talking buffers are clear.");
            else if (cmd.includes("who are you")) speak("I am the KA-A2A OMNI core. Your autonomous partner.");
            else if (cmd.includes("project") || cmd.includes("idea")) speak("I've analyzed the market. I suggest we initiate a scout for decentralized pathology assets.");
            else speak("Understood, sir. Pivoting my resources to execute that objective.");
        }
    </script>
</body>
</html>
