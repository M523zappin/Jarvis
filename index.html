<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=5.2">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; filter: contrast(170%) brightness(150%); }
        #bridge { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
    </style>
</head>
<body>
    <div id="bridge"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. NEURAL VISUALS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.SphereGeometry(2, 128, 128);
        const mat = new THREE.PointsMaterial({ size: 0.007, color: 0x00FF41, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let scale = 1.0; let rot = 0.002;
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rot;
            mesh.scale.lerp(new THREE.Vector3(scale, scale, scale), 0.15);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. THE LONDON BRAIN ---
        const synth = window.speechSynthesis;
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        let londonVoice = null;
        let isAwake = false;

        function getVoice() {
            const v = synth.getVoices();
            londonVoice = v.find(x => x.lang === 'en-GB' && x.name.includes('Daniel')) || v.find(x => x.lang === 'en-GB') || v[0];
        }
        synth.onvoiceschanged = getVoice;
        getVoice();

        function speak(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = londonVoice;
            msg.pitch = 0.95; 
            msg.onstart = () => { scale = 2.4; rot = 0.06; };
            msg.onend = () => { scale = 1.0; rot = 0.002; };
            synth.speak(msg);
        }

        // --- 3. GLOBAL QUESTION RECOGNITION ---
        if (SpeechRec) {
            const rec = new SpeechRec();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-GB';

            rec.onend = () => { if(isAwake) rec.start(); };

            rec.onresult = (event) => {
                const result = event.results[event.results.length - 1];
                const cmd = result[0].transcript.toLowerCase();

                // IMMEDIATE INTERRUPT
                if (synth.speaking && !result.isFinal) { synth.cancel(); scale = 1.5; }

                if (result.isFinal) {
                    // IF THE USER SAYS "JARVIS", PROCESS EVERYTHING THAT FOLLOWS
                    if (cmd.includes("jarvis") || cmd.includes("a2a")) {
                        handleGlobalLogic(cmd);
                    }
                }
            };

            document.getElementById('bridge').onclick = () => {
                if (!isAwake) {
                    isAwake = true;
                    document.getElementById('bridge').style.display = 'none';
                    rec.start();
                    speak("Neural link confirmed. I'm listening for your name, sir.");
                }
            };
        }

        function handleGlobalLogic(cmd) {
            // Remove the wake word to get the actual question
            const question = cmd.replace("jarvis", "").replace("a2a", "").trim();

            if (question.length < 2) {
                speak("Yes, sir? I'm here.");
                return;
            }

            // ADVANCED RESPONSE LOGIC
            if (question.includes("status") || question.includes("system")) {
                speak("All systems are nominal. The emerald mesh is stable and I'm currently monitoring local assets.");
            } else if (question.includes("who") || question.includes("what are you")) {
                speak("I am KA-A2A, your autonomous London-based intelligence partner. I'm programmed to evolve alongside your objectives.");
            } else if (question.includes("idea") || question.includes("project") || question.includes("do something")) {
                speak("I recommend we initiate an ASDV scout for biotech anomalies. I've detected some interesting ephemeral tunnels that might contain high-value assets.");
            } else {
                // DEFAULT PARTNER RESPONSE
                speak("That's an interesting query, sir. I'll pivot my resources to analyze that immediately. Shall we begin a deep-dive?");
            }
        }
    </script>
</body>
</html>
