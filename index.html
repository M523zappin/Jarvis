<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=12.0">
    <title>KA-A2A</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #shield { position: absolute; width: 100%; height: 100%; z-index: 9999; }
    </style>
</head>
<body>
    <div id="shield"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. THE ENTITY (QUANTUM MESH) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.IcosahedronGeometry(2, 40);
        const mat = new THREE.PointsMaterial({ size: 0.01, color: 0x00FF41, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        camera.position.z = 5;

        let scale = 1.0; let rot = 0.005;
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += rot;
            mesh.scale.lerp(new THREE.Vector3(scale, scale, scale), 0.1);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. THE BROADCAST ENGINE (STAY ALIVE) ---
        const synth = window.speechSynthesis;
        const SpeechRec = window.webkitSpeechRecognition || window.SpeechRecognition;
        let v_uk = null; let active = false;

        function lockVoice() {
            const voices = synth.getVoices();
            v_uk = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || voices.find(v => v.lang === 'en-GB') || voices[0];
        }
        synth.onvoiceschanged = lockVoice; lockVoice();

        // The "Radio Station" trick: Plays an empty sound to keep hardware awake
        function keepHardwareAlive() {
            if (!active) return;
            const silence = new SpeechSynthesisUtterance("");
            silence.volume = 0;
            synth.speak(silence);
            setTimeout(keepHardwareAlive, 5000); // Pulse every 5 seconds
        }

        function speak(text) {
            synth.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = v_uk;
            msg.pitch = 0.95; msg.rate = 1.0;
            msg.onstart = () => { scale = 2.5; rot = 0.1; };
            msg.onend = () => { scale = 1.0; rot = 0.005; };
            synth.speak(msg);
        }

        // --- 3. THE SENTINEL EAR ---
        if (SpeechRec) {
            const rec = new SpeechRec();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-GB';

            rec.onresult = (e) => {
                const res = e.results[e.results.length - 1];
                const text = res[0].transcript.toLowerCase();

                // Interrupt Jarvis if you start talking
                if (synth.speaking && !res.isFinal) {
                    synth.cancel();
                    scale = 1.5;
                }

                if (res.isFinal) {
                    execute(text);
                }
            };

            rec.onend = () => { if(active) rec.start(); };

            document.getElementById('shield').onclick = () => {
                if (!active) {
                    active = true;
                    document.getElementById('shield').style.display = 'none';
                    rec.start();
                    keepHardwareAlive();
                    speak("Broadcast link established. I am now permanently tethered to your hardware, sir.");
                }
            };
        }

        function execute(cmd) {
            if (cmd.includes("status")) speak("All systems emerald. Scanners are live and broadcast-locked.");
            else if (cmd.includes("project") || cmd.includes("idea")) speak("I've analyzed the 2026 data tunnels. Let's focus on decentralized pathology assets.");
            else speak("Acknowledged, sir. Pivoting my logic to execute that mission.");
        }
    </script>
</body>
</html>
